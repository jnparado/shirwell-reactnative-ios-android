apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

def shirwellKeystoreProps = new Properties()
def shirwellKeystoreFile = rootProject.file("keystore.properties")
if (shirwellKeystoreFile.exists()) {
    shirwellKeystoreFile.withInputStream { shirwellKeystoreProps.load(it) }
}

def shirwellProp = { String key ->
    def v = shirwellKeystoreProps.getProperty(key)
    return v == null ? null : v.trim()
}

// Prefer environment variables so passwords never need to live in keystore.properties (or git).
def shirwellEnv = { String key ->
    def v = System.getenv(key)
    return v == null ? null : v.trim()
}

def shirwellReleaseStoreFilePath = shirwellEnv('SHIRWELL_RELEASE_STORE_FILE') ?: shirwellProp('SHIRWELL_RELEASE_STORE_FILE')
def shirwellReleaseStorePassword = shirwellEnv('SHIRWELL_RELEASE_STORE_PASSWORD') ?: shirwellProp('SHIRWELL_RELEASE_STORE_PASSWORD')
def shirwellReleaseKeyAlias = shirwellEnv('SHIRWELL_RELEASE_KEY_ALIAS') ?: shirwellProp('SHIRWELL_RELEASE_KEY_ALIAS')
def shirwellReleaseKeyPassword = shirwellEnv('SHIRWELL_RELEASE_KEY_PASSWORD') ?: shirwellProp('SHIRWELL_RELEASE_KEY_PASSWORD')

def shirwellReleaseSigningReady =
        shirwellReleaseStoreFilePath &&
                shirwellReleaseStorePassword &&
                shirwellReleaseStorePassword != 'CHANGE_ME' &&
                shirwellReleaseKeyPassword &&
                shirwellReleaseKeyPassword != 'CHANGE_ME' &&
                shirwellReleaseKeyAlias &&
                rootProject.file(shirwellReleaseStoreFilePath).exists()

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.shirwell.shirwell"
    defaultConfig {
        applicationId "com.shirwell.shirwell"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 58
        versionName "1.0.58"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (shirwellReleaseSigningReady) {
                storeFile rootProject.file(shirwellReleaseStoreFilePath)
                storePassword shirwellReleaseStorePassword
                keyAlias shirwellReleaseKeyAlias
                keyPassword shirwellReleaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            // When upload signing is configured, use it. Otherwise Gradle still needs a signing config to
            // configure the variant; release packaging tasks are blocked unless signing is configured.
            signingConfig shirwellReleaseSigningReady ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    // AGP 8.5+ uses uncompressed JNI + 16 KB zip alignment for bundles; avoid legacy JNI packaging.
    packaging {
        jniLibs {
            useLegacyPackaging false
        }
    }
    lint {
        // Kotlin 2.x + AGP 8.7 lint can OOM / crash on third-party modules; release artifacts do not need this gate here.
        checkReleaseBuilds false
    }
}

// Fail fast on release packaging if upload signing is not configured (avoids silent debug-signed AAB/APK).
tasks.configureEach { task ->
    def name = task.name
    if (name == 'bundleRelease' || name == 'assembleRelease' || name == 'packageRelease' || name == 'packageReleaseBundle' || name == 'signReleaseBundle' || name == 'signingConfigWriterRelease') {
        task.doFirst {
            if (!shirwellReleaseSigningReady) {
                throw new GradleException(
                        "Release signing is not configured. Play Store requires a non-debug upload key.\n\n" +
                                "Option A (recommended): export passwords for this terminal session, then rebuild:\n" +
                                "  export SHIRWELL_RELEASE_STORE_FILE=app/keystores/shirwell-release.keystore\n" +
                                "  export SHIRWELL_RELEASE_KEY_ALIAS=shirwell\n" +
                                "  export SHIRWELL_RELEASE_STORE_PASSWORD='(your keystore password)'\n" +
                                "  export SHIRWELL_RELEASE_KEY_PASSWORD='(usually same as store password)'\n" +
                                "  ./gradlew bundleRelease\n\n" +
                                "Option B: put the same values in: ${shirwellKeystoreFile.absolutePath}\n" +
                                "(fill SHIRWELL_RELEASE_STORE_PASSWORD / SHIRWELL_RELEASE_KEY_PASSWORD; do not commit real passwords to git)\n"
                )
            }
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.google.android.gms:play-services-ads:23.5.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
